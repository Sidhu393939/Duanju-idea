<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短剧 · Duanju Drama Archive</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #0a0806;
  --paper: #f5ede0;
  --aged: #e8d8c0;
  --gold: #c9943a;
  --gold-light: #e8b84b;
  --red: #8b2020;
  --mist: #2a2018;
  --text: #f0e6d3;
  --text-dim: #8a7a66;
  --border: rgba(201,148,58,0.2);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--ink);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Atmospheric background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(139,32,32,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(201,148,58,0.05) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201,148,58,0.015) 60px, rgba(201,148,58,0.015) 61px);
  pointer-events: none;
  z-index: 0;
}

/* ─── HEADER ─── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,8,6,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 30px;
  display: flex;
  align-items: center;
  gap: 30px;
  height: 70px;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-shrink: 0;
}

.logo-zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 4px;
}

.logo-en {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 300;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.logo-dot {
  width: 4px;
  height: 4px;
  background: var(--red);
  border-radius: 50%;
  flex-shrink: 0;
  margin-bottom: 3px;
}

.search-wrap {
  flex: 1;
  position: relative;
  max-width: 500px;
}

.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 14px;
  pointer-events: none;
}

#search {
  width: 100%;
  padding: 10px 14px 10px 40px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  letter-spacing: 0.5px;
  transition: border-color 0.3s, background 0.3s;
  outline: none;
}

#search::placeholder { color: var(--text-dim); font-style: italic; }
#search:focus {
  border-color: rgba(201,148,58,0.5);
  background: rgba(255,255,255,0.06);
}

.count-badge {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 1px;
  flex-shrink: 0;
  font-family: 'Cormorant Garamond', serif;
}

/* ─── HERO ─── */
.hero {
  position: relative;
  z-index: 1;
  padding: 60px 30px 40px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.hero-eyebrow {
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
  opacity: 0;
  animation: fadeUp 0.8s 0.1s forwards;
}

.hero-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(36px, 6vw, 72px);
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
  letter-spacing: 8px;
  opacity: 0;
  animation: fadeUp 0.8s 0.2s forwards;
}

.hero-title span {
  color: var(--gold);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.6em;
  letter-spacing: 4px;
  display: block;
  margin-top: 8px;
}

.hero-line {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 24px auto;
  opacity: 0;
  animation: fadeUp 0.8s 0.3s forwards;
}

/* ─── FILTERS ─── */
.filters {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 8px;
  padding: 20px 30px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
}

.filters::-webkit-scrollbar { display: none; }

.filter-btn {
  padding: 6px 18px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  border-radius: 2px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  letter-spacing: 1px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s;
}

.filter-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}

.filter-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: var(--ink);
  font-weight: 600;
}

/* ─── GRID ─── */
#grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1px;
  background: var(--border);
  margin: 30px;
  border: 1px solid var(--border);
}

/* ─── CARD ─── */
.card {
  background: var(--ink);
  cursor: pointer;
  overflow: hidden;
  position: relative;
  aspect-ratio: 2/3;
  transition: z-index 0s;
}

.card:hover { z-index: 2; }

.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.4s;
  filter: brightness(0.85) saturate(0.9);
}

.card:hover .card-img {
  transform: scale(1.06);
  filter: brightness(1) saturate(1.1);
}

/* Poster placeholder */
.card-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a1208 0%, #0d0a06 100%);
  gap: 12px;
}

.card-placeholder .zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  color: var(--gold);
  opacity: 0.4;
}

/* Overlay */
.card-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to top,
    rgba(10,8,6,0.98) 0%,
    rgba(10,8,6,0.7) 40%,
    rgba(10,8,6,0.1) 70%,
    transparent 100%
  );
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 18px;
  transform: translateY(10px);
  opacity: 0;
  transition: opacity 0.35s, transform 0.35s;
}

.card:hover .card-overlay {
  opacity: 1;
  transform: translateY(0);
}

/* Always-visible bottom bar */
.card-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, rgba(10,8,6,0.95) 0%, transparent 100%);
  padding: 30px 14px 12px;
  pointer-events: none;
}

.card-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Overlay content */
.overlay-cast {
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
  letter-spacing: 0.5px;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.overlay-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
  line-height: 1.3;
}

.overlay-open {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: var(--gold);
  color: var(--ink);
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 2px;
  transition: background 0.2s;
  font-family: 'Cormorant Garamond', serif;
}

.overlay-open:hover { background: var(--gold-light); }

/* ─── EMPTY STATE ─── */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
  color: var(--text-dim);
}

.empty-zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 40px;
  opacity: 0.15;
  margin-bottom: 16px;
}

.empty p {
  font-size: 16px;
  font-style: italic;
}

/* ─── LOADING ─── */
.loading {
  position: fixed;
  inset: 0;
  background: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 20px;
  transition: opacity 0.5s;
}

.loading.hidden { opacity: 0; pointer-events: none; }

.loading-zh {
  font-family: 'Noto Serif SC', serif;
  font-size: 36px;
  color: var(--gold);
  letter-spacing: 12px;
  animation: pulse 1.5s infinite;
}

.loading-bar {
  width: 120px;
  height: 1px;
  background: var(--border);
  position: relative;
  overflow: hidden;
}

.loading-bar::after {
  content: '';
  position: absolute;
  left: -40%;
  top: 0;
  width: 40%;
  height: 100%;
  background: var(--gold);
  animation: slide 1s infinite;
}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

@keyframes slide {
  from { left: -40%; }
  to { left: 100%; }
}

.card {
  opacity: 0;
  animation: fadeUp 0.5s forwards;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  .header { padding: 0 16px; gap: 12px; }
  .hero { padding: 40px 16px 30px; }
  .filters { padding: 14px 16px; }
  #grid { margin: 16px; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .logo-en { display: none; }
  .logo-dot { display: none; }
  .count-badge { display: none; }
}
</style>
</head>

<body>

<!-- Loading screen -->
<div class="loading" id="loading">
  <div class="loading-zh">短剧</div>
  <div class="loading-bar"></div>
</div>

<!-- Header -->
<header class="header">
  <div class="logo">
    <span class="logo-zh">短剧</span>
    <div class="logo-dot"></div>
    <span class="logo-en">Duanju Archive</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search" placeholder="Search by title or cast…" autocomplete="off">
  </div>
  <span class="count-badge" id="count-badge"></span>
</header>

<!-- Hero -->
<section class="hero">
  <p class="hero-eyebrow">Chinese Short Drama Collection</p>
  <h1 class="hero-title">
    短剧档案馆
    <span>Drama Archive</span>
  </h1>
  <div class="hero-line"></div>
</section>

<!-- Filters -->
<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
</div>

<!-- Grid -->
<div id="grid"></div>

<script>
let dramas = [];
let activeFilter = 'all';

// Attempt to load dramas.json; fall back to sample data
fetch("dramas.json")
  .then(r => r.json())
  .then(data => {
    dramas = data;
    buildFilters(data);
    render(data);
  })
  .catch(() => {
    // Sample data for demonstration
    dramas = [
      ["霸总的秘密", "张伟 · 李梅", "2024", "Romance", "8.2", "https://example.com", ""],
      ["重生之巅峰", "王刚 · 陈晓", "2024", "Action", "7.9", "https://example.com", ""],
      ["千金归来", "刘洋 · 赵敏", "2023", "Drama", "8.5", "https://example.com", ""],
      ["命中注定", "孙浩 · 林林", "2024", "Romance", "7.7", "https://example.com", ""],
      ["逆袭人生", "周杰 · 吴静", "2024", "Drama", "8.1", "https://example.com", ""],
      ["穿越时空的爱", "郑伟 · 许倩", "2023", "Fantasy", "8.8", "https://example.com", ""],
      ["总裁的替身", "冯明 · 苏苏", "2024", "Romance", "7.5", "https://example.com", ""],
      ["神医下山", "韩东 · 白雪", "2024", "Action", "8.3", "https://example.com", ""],
      ["贵女难当", "陆凯 · 云儿", "2023", "Historical", "8.6", "https://example.com", ""],
      ["闪婚老公", "江浩 · 姜南", "2024", "Romance", "7.8", "https://example.com", ""],
      ["王者归来", "沈毅 · 冰冰", "2024", "Action", "8.0", "https://example.com", ""],
      ["锦鲤附身", "叶帆 · 晓晨", "2023", "Fantasy", "8.4", "https://example.com", ""],
    ];
    buildFilters(dramas);
    render(dramas);
  })
  .finally(() => {
    setTimeout(() => document.getElementById("loading").classList.add("hidden"), 600);
  });

function buildFilters(data) {
  const genres = [...new Set(data.map(d => d[3]).filter(Boolean))];
  const filtersEl = document.getElementById("filters");
  genres.forEach(g => {
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.dataset.filter = g;
    btn.textContent = g;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilter = g;
      applyFilters();
    });
    filtersEl.appendChild(btn);
  });

  document.querySelector('[data-filter="all"]').addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    document.querySelector('[data-filter="all"]').classList.add("active");
    activeFilter = 'all';
    applyFilters();
  });
}

function applyFilters() {
  const q = document.getElementById("search").value.toLowerCase();
  let filtered = dramas;
  if (activeFilter !== 'all') filtered = filtered.filter(d => d[3] === activeFilter);
  if (q) filtered = filtered.filter(d =>
    (d[0] || '').toLowerCase().includes(q) ||
    (d[1] || '').toLowerCase().includes(q)
  );
  render(filtered);
}

function render(data) {
  const grid = document.getElementById("grid");
  const badge = document.getElementById("count-badge");

  grid.innerHTML = "";
  badge.textContent = data.length + " titles";

  if (data.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-zh">无</div>
        <p>No dramas found. Try a different search.</p>
      </div>`;
    return;
  }

  data.forEach((d, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(i * 40, 600)}ms`;

    const hasImg = d[6] && d[6].trim() !== '';
    const imgContent = hasImg
      ? `<img class="card-img" src="${d[6]}" alt="${d[0]}" loading="lazy" onerror="this.parentNode.replaceChild(makePlaceholder('${d[0]}'), this)">`
      : `<div class="card-placeholder"><div class="zh">${d[0] ? d[0][0] : '剧'}</div></div>`;

    card.innerHTML = `
      ${imgContent}
      <div class="card-bar">
        <div class="card-title">${d[0] || 'Untitled'}</div>
      </div>
      <div class="card-overlay">
        <div class="overlay-cast">${d[1] || ''}</div>
        <div class="overlay-title">${d[0] || 'Untitled'}</div>
        <a class="overlay-open" href="${d[5] || '#'}" target="_blank" rel="noopener">
          ▶ Watch Now
        </a>
      </div>
    `;

    grid.appendChild(card);
  });
}

function makePlaceholder(title) {
  const div = document.createElement("div");
  div.className = "card-placeholder";
  div.innerHTML = `<div class="zh">${title ? title[0] : '剧'}</div>`;
  return div;
}

document.getElementById("search").addEventListener("input", applyFilters);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
